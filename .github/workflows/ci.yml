name: ci

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

# Toolchain version pins - update at each minor release to maintain reproducibility.
# Versions recorded here must match Dockerfile and docs/thesis/REPRODUCIBILITY_APPENDIX.md.
env:
  QEMU_VERSION: "8.2.0"
  GCC_AARCH64_VERSION: "12"
  CPPCHECK_VERSION: "2.13"
  CLANG_VERSION: "14"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    env:
      CC: ${{ matrix.compiler }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc clang python3

      - name: Preflight (${{ matrix.compiler }})
        run: ./scripts/ci/ci-preflight.sh

      - name: Capture metadata (${{ matrix.compiler }})
        run: ./scripts/ci/ci-metadata.sh

      - name: Upload build artifacts (${{ matrix.compiler }})
        uses: actions/upload-artifact@v4
        with:
          name: haven-${{ matrix.compiler }}-${{ github.sha }}
          path: |
            build/libhaven_core.a
            build/ci/metadata.txt

  arm64-cross-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ARM64 cross-compiler and CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu cmake ninja-build

      - name: Configure (CMake arm64-qemu preset)
        run: cmake --preset arm64-qemu

      - name: Cross-compile haven.elf (ARM64)
        run: cmake --build build

      - name: Verify ELF target architecture
        run: |
          file build/haven.elf | grep -q "ARM aarch64" && echo "OK: ARM64 ELF"
          aarch64-linux-gnu-objdump -d build/haven.elf | grep -q "el2_exception_table\|haven_init" \
            && echo "OK: key symbols present"

      - name: Upload ARM64 binary
        uses: actions/upload-artifact@v4
        with:
          name: haven-arm64-${{ github.sha }}
          path: |
            build/haven.elf
            build/haven.bin

  website-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        working-directory: website
        run: npm install

      - name: Build website
        working-directory: website
        run: npm run build

  cmake-host-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CMake, Ninja, and GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc cmake ninja-build

      - name: Configure (CMake host-tests preset)
        run: cmake --preset host-tests

      - name: Build all host test binaries
        run: cmake --build build-host

      - name: Run test suite (CTest)
        run: ctest --test-dir build-host --output-on-failure

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-host-${{ github.sha }}
          retention-days: 30
          path: build/benchmarks/

  qemu-smoke:
    runs-on: ubuntu-latest
    needs: [arm64-cross-compile]
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-arm

      - name: Download ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: haven-arm64-${{ github.sha }}
          path: build/

      - name: Mark binaries executable
        run: chmod +x build/haven.elf build/haven.bin || true

      - name: Run QEMU smoke test
        run: ./scripts/qemu/qemu-smoke.sh

      - name: Upload QEMU validation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-validation-${{ github.sha }}
          retention-days: 30
          path: build/evidence/qemu-validation.json

  coq-proofs:
    # Advisory job: verifies Coq isolation proofs compile under coqc.
    # continue-on-error until proofs are complete (M-P4-1).
    # Remove continue-on-error once IsolationModel.v / Stage2Policy.v / BudgetScheduler.v
    # all check cleanly in CI.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Coq
        run: |
          sudo apt-get update
          sudo apt-get install -y coq

      - name: Check Coq proofs
        working-directory: verification/coq
        run: |
          coqc IsolationModel.v
          coqc Stage2Policy.v
          coqc BudgetScheduler.v

      - name: Upload Coq proof check result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coq-proof-check-${{ github.sha }}
          retention-days: 30
          path: verification/coq/

  doxygen:
    # Advisory job: generates HTML API docs from include/haven/ and src/core/.
    # continue-on-error until >=80% of public API symbols have doc comments (M-DOCS-1).
    # Remove continue-on-error and set WARN_AS_ERROR=YES in Doxyfile once threshold is met.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen

      - name: Generate API documentation
        run: |
          mkdir -p build/doxygen
          doxygen Doxyfile 2>&1 | tee build/doxygen/doxygen.log

      - name: Count documented vs undocumented symbols (advisory)
        if: always()
        run: |
          WARN_COUNT=$(grep -c "warning:" build/doxygen/doxygen.log || true)
          echo "Doxygen warning count: ${WARN_COUNT}"
          echo "doxygen_warnings=${WARN_COUNT}" >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload API documentation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html-${{ github.run_id }}
          retention-days: 30
          path: build/doxygen/html/
