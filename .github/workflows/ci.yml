name: ci

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    env:
      CC: ${{ matrix.compiler }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc clang make python3

      - name: Preflight (${{ matrix.compiler }})
        run: ./scripts/ci-preflight.sh

      - name: Capture metadata (${{ matrix.compiler }})
        run: ./scripts/ci-metadata.sh

      - name: Upload build artifacts (${{ matrix.compiler }})
        uses: actions/upload-artifact@v4
        with:
          name: haven-${{ matrix.compiler }}-${{ github.sha }}
          path: |
            build/libhaven_core.a
            build/ci/metadata.txt
