name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    env:
      CC: ${{ matrix.compiler }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc clang make python3

      - name: Build (${{ matrix.compiler }})
        run: ./scripts/build.sh

      - name: Style Check (${{ matrix.compiler }})
        run: ./scripts/style-check.sh

      - name: Test (${{ matrix.compiler }})
        run: ./scripts/test.sh
