name: nightly-validation

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly-preflight:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    env:
      CC: ${{ matrix.compiler }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc clang make python3

      - name: Preflight
        run: ./scripts/ci/ci-preflight.sh

      - name: Capture metadata
        run: ./scripts/ci/ci-metadata.sh

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.compiler }}-${{ github.run_id }}
          retention-days: 30
          path: |
            build/libhaven_core.a
            build/tests/test_core_stubs
            build/obj/stage2.o
            build/obj/ownership.o
            build/obj/budget.o
            build/ci/metadata.txt

  arm64-cross-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ARM64 cross-compiler and CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu cmake ninja-build

      - name: Configure (CMake arm64-qemu preset)
        run: cmake --preset arm64-qemu

      - name: Cross-compile haven.elf (ARM64)
        run: cmake --build build

      - name: TCB size audit (target < 5000 lines of src/core/)
        run: |
          TCB_LINES=$(find src/core -name '*.c' -exec cat {} + | wc -l)
          echo "TCB lines: ${TCB_LINES}"
          [ "${TCB_LINES}" -lt 5000 ] && echo "PASS: TCB within 5000-line bound" || \
            { echo "WARN: TCB exceeds 5000 lines (${TCB_LINES})"; exit 1; }

      - name: Binary size report
        run: |
          aarch64-linux-gnu-size build/haven.elf
          TEXT=$(aarch64-linux-gnu-size build/haven.elf | awk 'NR==2{print $1}')
          echo "TEXT size: ${TEXT} bytes"

      - name: Upload ARM64 nightly binary
        uses: actions/upload-artifact@v4
        with:
          name: haven-arm64-nightly-${{ github.run_id }}
          retention-days: 30
          path: |
            build/haven.elf
            build/haven.bin

  coq-proof-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Coq
        run: |
          sudo apt-get update
          sudo apt-get install -y coq

      - name: Verify Coq isolation proofs
        run: make -C verification coq

      - name: Upload compiled proof objects
        uses: actions/upload-artifact@v4
        with:
          name: coq-proofs-${{ github.run_id }}
          retention-days: 30
          path: build/verification/coq/

  evidence-generation:
    runs-on: ubuntu-latest
    needs: [nightly-preflight, arm64-cross-compile]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make python3 python3-pip qemu-system-aarch64
          pip3 install --no-cache-dir matplotlib numpy

      - name: Run full test suite and benchmarks
        run: ./scripts/ci/ci-preflight.sh

      - name: Generate evidence report
        run: |
          mkdir -p build/evidence
          python3 tools/analysis/evidence_report.py build/ || true
          python3 tools/analysis/latency_analyzer.py build/benchmarks/isolation-latency.json || true

      - name: Upload evidence bundle
        uses: actions/upload-artifact@v4
        with:
          name: haven-evidence-${{ github.run_id }}
          retention-days: 90
          path: |
            build/evidence/
            build/benchmarks/

  benchmark-regression:
    runs-on: ubuntu-latest
    needs: [nightly-preflight]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc python3

      - name: Build benchmark binaries
        run: |
          CC="${CC:-gcc}"
          mkdir -p build/tests build/benchmarks
          $CC -std=c11 -D_POSIX_C_SOURCE=200809L -Wall -Wextra -Werror -Iinclude \
            tests/benchmarks/bench_isolation_latency.c \
            tests/common/printk_stub.c \
            src/core/mm/stage2.c \
            src/core/irq/ownership.c \
            src/core/sched/budget.c \
            src/core/dma/smmu.c \
            src/core/time/timer.c \
            src/core/iommu/iommu_policy.c \
            -o build/tests/bench_isolation_latency
          $CC -std=c11 -D_POSIX_C_SOURCE=200809L -Wall -Wextra -Werror -Iinclude \
            tests/benchmarks/bench_stage2_fault.c \
            tests/common/printk_stub.c \
            src/core/mm/stage2.c \
            src/core/irq/ownership.c \
            src/core/sched/budget.c \
            -o build/tests/bench_stage2_fault

      - name: Run benchmarks
        run: |
          build/tests/bench_isolation_latency
          build/tests/bench_stage2_fault

      - name: Regression check (threshold=10%)
        run: |
          chmod +x scripts/ci/bench-regression.sh
          BASELINE=tests/benchmarks/latency-baseline.json ./scripts/ci/bench-regression.sh

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          retention-days: 30
          path: build/benchmarks/

