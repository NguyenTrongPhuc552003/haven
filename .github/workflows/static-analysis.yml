name: Static Analysis

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main

jobs:
  cppcheck:
    name: cppcheck
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update -q && sudo apt-get install -y cppcheck

      - name: Run cppcheck on core modules
        run: |
          cppcheck \
            --std=c11 \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            -I include \
            src/core/ \
            src/guest/ \
            2>&1 | tee /tmp/cppcheck.txt

      - name: Upload cppcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: /tmp/cppcheck.txt

  clang-analyze:
    name: clang static analyzer
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang tools
        run: sudo apt-get update -q && sudo apt-get install -y clang clang-tools

      - name: Run clang --analyze on host-compilable files
        run: |
          set -e
          SRCS=$(find src/core src/guest -name "*.c" | sort)
          FAILED=0
          for f in $SRCS; do
            clang --analyze \
              -std=c11 \
              -I. \
              -Iinclude \
              -Isrc \
              -Xanalyzer -analyzer-output=text \
              -Xanalyzer -analyzer-checker=core,deadcode,security \
              "$f" 2>&1 || FAILED=1
          done
          exit $FAILED

  cppcheck-drivers:
    name: cppcheck (drivers)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update -q && sudo apt-get install -y cppcheck

      - name: Run cppcheck on drivers
        run: |
          cppcheck \
            --std=c11 \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            --suppress=syntaxError:drivers/linux/haven_driver.c \
            -I include \
            drivers/ \
            2>&1 | tee /tmp/cppcheck-drivers.txt

      - name: Upload drivers cppcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-drivers-report
          path: /tmp/cppcheck-drivers.txt
