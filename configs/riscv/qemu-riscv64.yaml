target: qemu-riscv64
description: Future RISC-V H-extension target (QEMU virt). Planned Phase 3+.

cpus:
  linux: [0, 1, 2, 3]
  rtos: [4, 5]
  hypervisor: [6]

memory:
  linux:
    base: 0x80000000
    size: 0x40000000
  rtos:
    base: 0xC0000000
    size: 0x10000000
  shared:
    base: 0xD0000000
    size: 0x01000000

interrupts:
  linux: [32, 33, 34, 35]
  rtos: [48, 49]

timing:
  period_us: 10000
  budgets_us:
    linux: 7000
    rtos: 2500
    hypervisor: 500
